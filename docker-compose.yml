services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8011:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/rezzerv.db
      PYTHONUNBUFFERED: "1"
      REZZERV_RECEIPT_STARTUP_OCR_WARMUP: "false"
      REZZERV_RECEIPT_STARTUP_REMBG_WARMUP: "false"
      REZZERV_OFF_SEARCH_PROVIDER: ${REZZERV_OFF_SEARCH_PROVIDER:-search_a_licious}
      REZZERV_OFF_SEARCH_A_LICIOUS_BASE_URL: ${REZZERV_OFF_SEARCH_A_LICIOUS_BASE_URL:-https://search.openfoodfacts.org/search}
      REZZERV_OFF_SEARCH_BASE_URL: ${REZZERV_OFF_SEARCH_BASE_URL:-https://world.openfoodfacts.org/cgi/search.pl}
      REZZERV_OFF_SEARCH_TIMEOUT_SECONDS: ${REZZERV_OFF_SEARCH_TIMEOUT_SECONDS:-8}
      REZZERV_OFF_SEARCH_MAX_QUERIES: ${REZZERV_OFF_SEARCH_MAX_QUERIES:-3}
      REZZERV_RECEIPT_EMAIL_DOMAIN: iogaroulda.resend.app
      REZZERV_EMAIL_ENABLED: "false"
      REZZERV_RESEND_API_KEY: ""
      REZZERV_RESEND_API_BASE_URL: https://api.resend.com
      REZZERV_NOTIFICATION_FROM_EMAIL: ""
      REZZERV_NOTIFICATION_FROM_NAME: Rezzerv
      REZZERV_APP_BASE_URL: http://localhost:5174
      REZZERV_GS1_MPM_SHARE_BASE_URL: ${REZZERV_GS1_MPM_SHARE_BASE_URL:-}
      REZZERV_GS1_MPM_SHARE_API_KEY: ${REZZERV_GS1_MPM_SHARE_API_KEY:-}
    volumes:
      - ./backend/data:/app/data
      - ./tools:/app/tools:ro
      - rezzerv_u2net:/root/.u2net
      - rezzerv_paddlex:/root/.paddlex

  frontend:
    build:
      context: ./frontend
      args:
        REZZERV_VERSION: ${REZZERV_VERSION:-Rezzerv-dev}
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  rezzerv_u2net:
  rezzerv_paddlex:
