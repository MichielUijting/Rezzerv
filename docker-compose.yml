services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rezzerv
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/rezzerv
      PYTHONUNBUFFERED: "1"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        # Provided by start.bat (reads VERSION.txt). Fallback keeps compose usable without the bat.
        REZZERV_VERSION: ${REZZERV_VERSION:-Rezzerv-dev}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
