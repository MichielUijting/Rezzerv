<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050" role="img" aria-labelledby="title desc">
  <title id="title">Rezzerv procesketen van Kassa naar Voorraad en Bijna op</title>
  <desc id="desc">Procesdiagram met kassabonverwerking, classificatie, universeel artikel, producttype, huishoudartikel, uitpakken, inventory events, voorraadprojectie en Bijna op.</desc>
  <defs>
    <linearGradient id="header" x1="0" x2="1"><stop offset="0" stop-color="#0b4f32"/><stop offset="1" stop-color="#063b25"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-opacity="0.16"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#0b5d38"/></marker>
    <style>
      .phase{font:700 24px Arial,sans-serif;fill:#0b4f32}.title{font:700 44px Arial,sans-serif;fill:white}.subtitle{font:italic 25px Arial,sans-serif;fill:white}.boxTitle{font:700 22px Arial,sans-serif;fill:#12372a}.boxText{font:17px Arial,sans-serif;fill:#283b34}.small{font:15px Arial,sans-serif;fill:#283b34}.badge{font:700 19px Arial,sans-serif;fill:white}.noteTitle{font:700 23px Arial,sans-serif;fill:#0b4f32}.noteText{font:17px Arial,sans-serif;fill:#24352f}.lane{fill:#eef8f0}.card{fill:white;stroke:#bfd8c6;stroke-width:2;rx:16;filter:url(#shadow)}.flow{stroke:#0b5d38;stroke-width:5;fill:none;marker-end:url(#arrow)}.bullet{fill:#0b5d38}
    </style>
  </defs>
  <rect width="1800" height="1050" fill="#f7fbf8"/>
  <rect x="0" y="0" width="1800" height="112" rx="20" fill="url(#header)"/>
  <text x="900" y="49" text-anchor="middle" class="title">Rezzerv procesketen: van Kassa naar Voorraad en Bijna op</text>
  <text x="900" y="86" text-anchor="middle" class="subtitle">Inclusief koppeling met universele artikelen en producttype</text>

  <rect x="20" y="125" width="250" height="700" class="lane"/><rect x="280" y="125" width="370" height="700" class="lane"/>
  <rect x="660" y="125" width="560" height="700" class="lane"/><rect x="1230" y="125" width="330" height="700" class="lane"/>
  <rect x="1570" y="125" width="210" height="700" class="lane"/>
  <text x="145" y="165" text-anchor="middle" class="phase">1) Invoer</text>
  <text x="465" y="165" text-anchor="middle" class="phase">2) Verwerking kassabon</text>
  <text x="940" y="165" text-anchor="middle" class="phase">3) Artikelmodellering</text>
  <text x="1395" y="165" text-anchor="middle" class="phase">4) Voorraadverwerking</text>
  <text x="1675" y="165" text-anchor="middle" class="phase">5) Signalering</text>

  <g transform="translate(40,215)"><rect width="205" height="260" class="card"/><circle cx="25" cy="25" r="18" fill="#0b5d38"/><text x="25" y="32" text-anchor="middle" class="badge">1</text><text x="102" y="80" text-anchor="middle" class="boxTitle">Kassa / Kassabon</text><text x="102" y="125" text-anchor="middle" class="boxText">Foto, upload, scan</text><text x="102" y="151" text-anchor="middle" class="boxText">of import</text><path d="M78 185 h48 v45 h-48 z M88 195 h28 M88 207 h28 M88 219 h20" stroke="#0b5d38" fill="none" stroke-width="4"/></g>
  <g transform="translate(300,215)"><rect width="205" height="260" class="card"/><circle cx="25" cy="25" r="18" fill="#0b5d38"/><text x="25" y="32" text-anchor="middle" class="badge">2</text><text x="102" y="80" text-anchor="middle" class="boxTitle">Parser &amp; normalisatie</text><text x="102" y="125" text-anchor="middle" class="boxText">Bonmetadata en</text><text x="102" y="151" text-anchor="middle" class="boxText">kassabonregels</text><circle cx="102" cy="205" r="28" fill="none" stroke="#0b5d38" stroke-width="5"/><path d="M102 167v15 M102 228v15 M64 205h15 M125 205h15 M76 179l11 11 M117 220l11 11 M128 179l-11 11 M87 220l-11 11" stroke="#0b5d38" stroke-width="5"/></g>
  <g transform="translate(525,215)"><rect width="205" height="260" class="card"/><circle cx="25" cy="25" r="18" fill="#0b5d38"/><text x="25" y="32" text-anchor="middle" class="badge">3</text><text x="102" y="76" text-anchor="middle" class="boxTitle">Classificatie</text><text x="102" y="104" text-anchor="middle" class="boxTitle">van regels</text><text x="102" y="145" text-anchor="middle" class="boxText">Artikelregels /</text><text x="102" y="171" text-anchor="middle" class="boxText">niet-voorraadregels</text><rect x="78" y="192" width="48" height="48" rx="5" fill="none" stroke="#0b5d38" stroke-width="4"/><path d="M88 207l7 7 14-15 M88 226l7 7 14-15" stroke="#0b5d38" fill="none" stroke-width="4"/></g>
  <g transform="translate(755,215)"><rect width="205" height="260" class="card"/><circle cx="25" cy="25" r="18" fill="#0b5d38"/><text x="25" y="32" text-anchor="middle" class="badge">4</text><text x="102" y="80" text-anchor="middle" class="boxTitle">Match &amp; herkenning</text><text x="102" y="125" text-anchor="middle" class="boxText">Barcode / GTIN /</text><text x="102" y="151" text-anchor="middle" class="boxText">retailer-code / tekstmatch</text><path d="M62 190v44 M70 190v44 M82 190v44 M96 190v44 M104 190v44 M119 190v44 M128 190v44" stroke="#0b5d38" stroke-width="5"/><circle cx="140" cy="220" r="17" fill="none" stroke="#0b5d38" stroke-width="5"/><path d="M152 232l18 18" stroke="#0b5d38" stroke-width="5"/></g>
  <g transform="translate(980,215)"><rect width="220" height="260" class="card"/><circle cx="25" cy="25" r="18" fill="#0b5d38"/><text x="25" y="32" text-anchor="middle" class="badge">5</text><text x="110" y="68" text-anchor="middle" class="boxTitle">Universeel artikel</text><text x="110" y="98" text-anchor="middle" class="boxText">Gedeelde productkennis</text><circle cx="38" cy="135" r="4" class="bullet"/><text x="52" y="141" class="small">GTIN / barcode</text><circle cx="38" cy="166" r="4" class="bullet"/><text x="52" y="172" class="small">naam, merk, inhoud</text><circle cx="38" cy="197" r="4" class="bullet"/><text x="52" y="203" class="small">producttype</text><circle cx="38" cy="228" r="4" class="bullet"/><text x="52" y="234" class="small">categorie / verrijking</text></g>
  <g transform="translate(1235,195)"><rect width="300" height="165" class="card"/><circle cx="25" cy="25" r="18" fill="#0b5d38"/><text x="25" y="32" text-anchor="middle" class="badge">6</text><text x="150" y="55" text-anchor="middle" class="boxTitle">Huishoudartikel</text><text x="150" y="84" text-anchor="middle" class="boxText">Huishoudspecifiek anker</text><text x="25" y="120" class="small">minimum/ideale voorraad • voorkeurwinkel</text><text x="25" y="145" class="small">notities • instellingen • locatievoorkeur</text></g>

  <path d="M245 345H292" class="flow"/><path d="M505 345H517" class="flow"/><path d="M730 345H747" class="flow"/><path d="M960 345H972" class="flow"/><path d="M1200 345H1227" class="flow"/>

  <path d="M627 475V545H760" class="flow"/>
  <g transform="translate(770,500)"><rect width="330" height="120" class="card"/><text x="165" y="42" text-anchor="middle" class="boxTitle">Spaar- en koopzegels</text><text x="165" y="75" text-anchor="middle" class="boxText">naar Spaartegoeden</text><text x="165" y="101" text-anchor="middle" class="boxText">niet naar Voorraad</text></g>

  <g transform="translate(1260,390)"><rect width="270" height="105" class="card"/><circle cx="25" cy="25" r="18" fill="#0b5d38"/><text x="25" y="32" text-anchor="middle" class="badge">7</text><text x="135" y="42" text-anchor="middle" class="boxTitle">Uitpakken / toewijzen</text><text x="135" y="73" text-anchor="middle" class="boxText">Controleren, muteren en locatie kiezen</text></g>
  <g transform="translate(1260,520)"><rect width="270" height="105" class="card"/><circle cx="25" cy="25" r="18" fill="#0b5d38"/><text x="25" y="32" text-anchor="middle" class="badge">8</text><text x="135" y="42" text-anchor="middle" class="boxTitle">Inventory event: aankoop</text><text x="135" y="73" text-anchor="middle" class="boxText">Event-based voorraadmutatie</text></g>
  <g transform="translate(1260,650)"><rect width="270" height="105" class="card"/><circle cx="25" cy="25" r="18" fill="#0b5d38"/><text x="25" y="32" text-anchor="middle" class="badge">9</text><text x="135" y="42" text-anchor="middle" class="boxTitle">Voorraadprojectie</text><text x="135" y="72" text-anchor="middle" class="boxText">Som van inventory events per locatie</text></g>
  <g transform="translate(1260,780)"><rect width="270" height="105" class="card"/><circle cx="25" cy="25" r="18" fill="#0b5d38"/><text x="25" y="32" text-anchor="middle" class="badge">10</text><text x="135" y="42" text-anchor="middle" class="boxTitle">Voorraad</text><text x="135" y="73" text-anchor="middle" class="boxText">Overzicht, locaties en details</text></g>
  <path d="M1395 360V382" class="flow"/><path d="M1395 495V512" class="flow"/><path d="M1395 625V642" class="flow"/><path d="M1395 755V772" class="flow"/>

  <g transform="translate(1585,430)"><rect width="175" height="210" class="card"/><circle cx="25" cy="25" r="18" fill="#0b5d38"/><text x="25" y="32" text-anchor="middle" class="badge">11</text><text x="88" y="68" text-anchor="middle" class="boxTitle">Bijna op-logica</text><text x="88" y="105" text-anchor="middle" class="small">actuele voorraad</text><text x="88" y="131" text-anchor="middle" class="small">minimumvoorraad</text><text x="88" y="157" text-anchor="middle" class="small">verbruik / voorspelling</text><path d="M30 185h110 M40 177l25-30 25 15 30-42 20 20" stroke="#0b5d38" fill="none" stroke-width="5"/></g>
  <g transform="translate(1585,690)"><rect width="175" height="170" class="card"/><circle cx="25" cy="25" r="18" fill="#0b5d38"/><text x="25" y="32" text-anchor="middle" class="badge">12</text><text x="88" y="66" text-anchor="middle" class="boxTitle">Bijna op</text><text x="88" y="105" text-anchor="middle" class="boxText">Signalen en</text><text x="88" y="132" text-anchor="middle" class="boxText">inkoopadvies</text></g>
  <path d="M1530 832H1568V535H1577" class="flow"/><path d="M1672 640V682" class="flow"/>

  <g transform="translate(55,865)"><rect width="800" height="150" class="card"/><text x="32" y="40" class="noteTitle">A. Rol van producttype</text><text x="32" y="76" class="noteText">• merk- en verpakkingsonafhankelijke aggregatie van concrete universele artikelen</text><text x="32" y="106" class="noteText">• ondersteunt filtering, rapportages, relevante velden en Bijna op-voorspelling</text><text x="32" y="136" class="noteText">• is niet hetzelfde als een huishoudspecifieke Artikelgroep</text></g>
  <g transform="translate(880,865)"><rect width="865" height="150" class="card"/><text x="32" y="40" class="noteTitle">B. Belangrijke architectuurregels</text><text x="32" y="76" class="noteText">• functioneel anker = huishoudartikel; gedeelde productkennis = universeel artikel</text><text x="32" y="106" class="noteText">• voorraad blijft event-based; receipt/import is geen voorraadlaag</text><text x="32" y="136" class="noteText">• spaar- en koopzegels worden apart geregistreerd als Spaartegoeden</text></g>
</svg>