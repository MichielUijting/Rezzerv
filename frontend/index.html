  <!-- PO-PROOF reset-session: early session reset before React loads -->
  <script>
    (function () {
      try {
        if (window.location.pathname === "/reset-session") {
          try {
            localStorage.removeItem("rezzerv_token");
            sessionStorage.clear();
          } catch (e) {}
          window.location.replace("/login?reset=1");
        }
      } catch (e) {}
    })();
  </script>

<script>
setTimeout(function(){
  try{
    const tables=document.querySelectorAll("table");
    if(!tables.length){console.log("TABLE DEBUG: no tables found");return;}
    tables.forEach((t,i)=>{
      const header=t.querySelector("thead tr");
      const filter=t.querySelector("thead tr:nth-child(2)");
      const body=t.querySelector("tbody tr");
      const cell=t.querySelector("tbody td");
      const input=t.querySelector("thead input");

      console.log("=== TABLE DEBUG",i,"===");

      if(header) console.log("header row height:",header.getBoundingClientRect().height);
      if(filter) console.log("filter row height:",filter.getBoundingClientRect().height);
      if(body) console.log("body row height:",body.getBoundingClientRect().height);

      if(cell){
        const s=getComputedStyle(cell);
        console.log("td padding-top:",s.paddingTop);
        console.log("td padding-bottom:",s.paddingBottom);
        console.log("td line-height:",s.lineHeight);
        console.log("td font-size:",s.fontSize);
      }

      if(input) console.log("filter input height:",input.getBoundingClientRect().height);

      console.log("===================");
    });
  }catch(e){console.warn("TABLE DEBUG FAILED",e);}
},1500);
</script>


<script>
(function(){
  const observer = new MutationObserver(() => {
    const table = document.querySelector("table");
    if (!table) return;

    observer.disconnect();

    const header = table.querySelector("thead tr");
    const filter = table.querySelector("thead tr:nth-child(2)");
    const body = table.querySelector("tbody tr");
    const cell = table.querySelector("tbody td");
    const input = table.querySelector("thead input");

    console.log("=== TABLE DEBUG ===");

    if (header) console.log("header row height:", header.getBoundingClientRect().height);
    if (filter) console.log("filter row height:", filter.getBoundingClientRect().height);
    if (body) console.log("body row height:", body.getBoundingClientRect().height);

    if (cell) {
      const s = getComputedStyle(cell);
      console.log("td padding-top:", s.paddingTop);
      console.log("td padding-bottom:", s.paddingBottom);
      console.log("td line-height:", s.lineHeight);
      console.log("td font-size:", s.fontSize);
    }

    if (input) console.log("filter input height:", input.getBoundingClientRect().height);

    console.log("===================");
  });

  observer.observe(document.body, { childList: true, subtree: true });
})();
</script>

<script>
console.log("=== TABLE DEBUG THEORY TEST ===");

const table=document.querySelector("table");
if(!table){
  console.log("TABLE DEBUG: no table element found");
}else{
  const td=table.querySelector("tbody td");
  const tr=table.querySelector("tbody tr");
  const th=table.querySelector("thead th");

  if(td){
    const cs=getComputedStyle(td);
    console.log("TD classList:", td.className);
    console.log("TD padding-top:", cs.paddingTop);
    console.log("TD padding-bottom:", cs.paddingBottom);
    console.log("TD line-height:", cs.lineHeight);
    console.log("TD height:", td.getBoundingClientRect().height);
  }

  if(tr){
    console.log("TR classList:", tr.className);
    console.log("TR height:", tr.getBoundingClientRect().height);
  }

  if(th){
    const cs=getComputedStyle(th);
    console.log("TH classList:", th.className);
    console.log("TH padding-top:", cs.paddingTop);
    console.log("TH padding-bottom:", cs.paddingBottom);
    console.log("TH height:", th.getBoundingClientRect().height);
  }

  const all=table.querySelectorAll("td");
  if(all.length){
    const classes=new Set();
    all.forEach(e=>{
      e.classList.forEach(c=>classes.add(c));
    });
    console.log("ALL TD CLASSES FOUND:", [...classes]);
  }
}

console.log("=== END TABLE DEBUG ===");
</script>
