<!DOCTYPE html>
<html lang="nl">
  <head>
    
  <!-- PO-PROOF reset-session: early session reset before React loads -->
  <script>
    (function () {
      try {
        if (window.location.pathname === "/reset-session") {
          try {
            localStorage.removeItem("rezzerv_token");
            sessionStorage.clear();
          } catch (e) {}
          window.location.replace("/login?reset=1");
        }
      } catch (e) {}
    })();
  </script>
<meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rezzerv</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  
<script>
setTimeout(function(){
  try{
    const tables=document.querySelectorAll("table");
    if(!tables.length){console.log("TABLE DEBUG: no tables found");return;}
    tables.forEach((t,i)=>{
      const header=t.querySelector("thead tr");
      const filter=t.querySelector("thead tr:nth-child(2)");
      const body=t.querySelector("tbody tr");
      const cell=t.querySelector("tbody td");
      const input=t.querySelector("thead input");

      console.log("=== TABLE DEBUG",i,"===");

      if(header) console.log("header row height:",header.getBoundingClientRect().height);
      if(filter) console.log("filter row height:",filter.getBoundingClientRect().height);
      if(body) console.log("body row height:",body.getBoundingClientRect().height);

      if(cell){
        const s=getComputedStyle(cell);
        console.log("td padding-top:",s.paddingTop);
        console.log("td padding-bottom:",s.paddingBottom);
        console.log("td line-height:",s.lineHeight);
        console.log("td font-size:",s.fontSize);
      }

      if(input) console.log("filter input height:",input.getBoundingClientRect().height);

      console.log("===================");
    });
  }catch(e){console.warn("TABLE DEBUG FAILED",e);}
},1500);
</script>

</body>
</html>
