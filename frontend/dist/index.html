<!DOCTYPE html>
<html lang="nl">
  <head>
    <script>
      (function () {
        try {
          if (window.location.pathname === "/reset-session") {
            try {
              localStorage.removeItem("rezzerv_token");
              sessionStorage.clear();
            } catch (e) {}
            window.location.replace("/login?reset=1");
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />

    <title>Rezzerv</title>
    <script>
      (function () {
        try {
          const params = new URLSearchParams(window.location.search)
          const isRegressionMode = params.get('regression_mode') === '1'
          if (isRegressionMode) {
            document.documentElement.setAttribute('data-regression-mode', '1')
            return
          }
          const preconnectFonts = document.createElement('link')
          preconnectFonts.rel = 'preconnect'
          preconnectFonts.href = 'https://fonts.googleapis.com'
          document.head.appendChild(preconnectFonts)
          const preconnectStatic = document.createElement('link')
          preconnectStatic.rel = 'preconnect'
          preconnectStatic.href = 'https://fonts.gstatic.com'
          preconnectStatic.crossOrigin = 'anonymous'
          document.head.appendChild(preconnectStatic)
          const fontStylesheet = document.createElement('link')
          fontStylesheet.rel = 'stylesheet'
          fontStylesheet.href = 'https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap'
          document.head.appendChild(fontStylesheet)
        } catch (e) {}
      })();
    </script>

    <script>
      fetch('/version.json', { cache: 'no-store' })
        .then((response) => response.ok ? response.json() : null)
        .then((versionInfo) => {
          if (!versionInfo || !versionInfo.version) return
          window.__REZZERV_VERSION__ = versionInfo
        })
