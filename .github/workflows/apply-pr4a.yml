name: Apply PR4A line filter
on:
  push:
    branches: [automation/receipt-line-filter-pr4a]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python tools/apply_pr4a_line_filter.py
      - run: |
          git config user.name 'rezzerv-bot'
          git config user.email 'bot@rezzerv.local'
          git add -A
          git commit -m "PR4A: Apply line filtering (SSOT-safe)" || echo "no changes"
          git push
