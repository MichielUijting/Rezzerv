name: Apply Kassa SSOT PR2B
on:
  push:
    branches: [automation/kassa-ssot-pr2b]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python tools/apply_kassa_ssot_pr2b.py
      - run: |
          git config user.name 'rezzerv-bot'
          git config user.email 'bot@rezzerv.local'
          git add -A
          git commit -m "PR2B: Wire Kassa to SSOT [skip ci]" || echo "no changes"
          git push
