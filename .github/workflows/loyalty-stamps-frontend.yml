name: Loyalty stamps frontend

on:
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/src/features/home/HomePage.jsx'
      - 'frontend/src/features/loyaltyStamps/**'
      - 'frontend/src/app/router/AppRouter.jsx'
      - '.github/workflows/loyalty-stamps-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-loyalty-stamps-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installeer frontend-afhankelijkheden
        working-directory: frontend
        run: npm ci

      - name: Bouw productiefrontend
        working-directory: frontend
        run: npm run build

      - name: Controleer Spaartegoeden-contract
        run: |
          python - <<'PY'
          from pathlib import Path

          home = Path('frontend/src/features/home/HomePage.jsx').read_text(encoding='utf-8')
          router = Path('frontend/src/app/router/AppRouter.jsx').read_text(encoding='utf-8')
          page = Path('frontend/src/features/loyaltyStamps/LoyaltyStampsPage.jsx').read_text(encoding='utf-8')

          checks = {
              'actiebutton': "label: 'Spaartegoeden'" in home,
              'navigatie': "navigate('/spaartegoeden')" in home,
              'beveiligde route': "path: '/spaartegoeden'" in router and '<Protected><LoyaltyStampsPage /></Protected>' in router,
              'programma-api': "'/api/loyalty-stamps/programs'" in page,
              'transactie-api': "'/api/loyalty-stamps/transactions?" in page or '`/api/loyalty-stamps/transactions?' in page,
              'lege status': 'loyalty-stamps-empty' in page,
              'detailtabel': 'loyalty-stamp-transactions-table' in page,
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit('Ontbrekende frontendcontracten: ' + ', '.join(failed))
          print('LOYALTY_STAMPS_FRONTEND_GREEN')
          PY
