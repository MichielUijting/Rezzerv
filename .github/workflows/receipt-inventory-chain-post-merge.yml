name: Receipt inventory chain merge gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-chain-after-merge:
    name: Verplichte kassabonketentest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout te valideren versie
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 1/6 Compileer ketentestmodules
        run: |
          python -m py_compile \
            backend/app/testing/receipt_inventory_chain_contract.py \
            backend/app/testing/receipt_inventory_chain_test_db.py \
            backend/app/testing/receipt_inventory_chain_step3.py \
            backend/app/testing/receipt_inventory_chain_step4.py \
            backend/app/testing/receipt_inventory_production_chain.py

      - name: 2/6 Valideer contract en geïsoleerde testdatabase
        run: |
          python -m backend.app.testing.receipt_inventory_chain_contract
          python -m backend.app.testing.receipt_inventory_chain_test_db

      - name: 3/6 Voer geïsoleerde keten 0-2-5-5 uit
        run: |
          python -m backend.app.testing.receipt_inventory_chain_step3
          python -m backend.app.testing.receipt_inventory_chain_step4

      - name: 4/6 Installeer minimale productie-afhankelijkheden
        run: |
          python -m pip install --quiet \
            fastapi==0.115.0 \
            sqlalchemy==2.0.36 \
            pydantic==2.12.5 \
            python-multipart==0.0.20 \
            pypdf==5.4.0 \
            Pillow \
            beautifulsoup4==4.12.3 \
            opencv-python-headless

      - name: 5/6 Voer productie-ketentest uit
        env:
          PYTHONPATH: backend
          RECEIPT_STORAGE_ROOT: ${{ runner.temp }}/rezzerv-receipts
        run: python backend/app/testing/receipt_inventory_production_chain.py

      - name: 6/6 Bevestig groene merge-gate
        run: echo 'KETENTEST GROEN - voorraadpad 0 -> 2 -> 5 -> 5'

  validate-powershell-runner:
    name: Valideer zichtbare PowerShell-runner
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout te valideren versie
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installeer productie-afhankelijkheden
        run: |
          python -m pip install --quiet \
            fastapi==0.115.0 \
            sqlalchemy==2.0.36 \
            pydantic==2.12.5 \
            python-multipart==0.0.20 \
            pypdf==5.4.0 \
            Pillow \
            beautifulsoup4==4.12.3 \
            opencv-python-headless

      - name: Voer PowerShell-ketentest met zichtbare voortgang uit
        shell: pwsh
        run: ./scripts/run-receipt-inventory-chain.ps1 -CiMode
