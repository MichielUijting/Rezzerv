name: Receipt inventory chain validation

on:
  push:
    branches:
      - m2c2m-ketentest-receipt-inventory-step1
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-isolated-chain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile geïsoleerde ketentestmodules
        run: |
          python -m py_compile \
            backend/app/testing/receipt_inventory_chain_contract.py \
            backend/app/testing/receipt_inventory_chain_test_db.py \
            backend/app/testing/receipt_inventory_chain_step3.py \
            backend/app/testing/receipt_inventory_chain_step4.py

      - name: Valideer testcontract
        run: python -m backend.app.testing.receipt_inventory_chain_contract

      - name: Voer geïsoleerde ketenvalidatie uit
        run: python -m backend.app.testing.receipt_inventory_chain_step4

  validate-production-chain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installeer minimale backend-afhankelijkheden
        run: |
          python -m pip install --quiet \
            fastapi==0.115.0 \
            sqlalchemy==2.0.36 \
            pydantic==2.12.5 \
            python-multipart==0.0.20 \
            pypdf==5.4.0 \
            Pillow \
            beautifulsoup4==4.12.3 \
            opencv-python-headless

      - name: Compile productie-ketentest
        run: python -m py_compile backend/app/testing/receipt_inventory_production_chain.py

      - name: Voer productie-keten uit en bewaar uitvoer
        id: production_chain
        continue-on-error: true
        env:
          PYTHONPATH: backend
          RECEIPT_STORAGE_ROOT: ${{ runner.temp }}/rezzerv-receipts
        run: |
          set +e
          python backend/app/testing/receipt_inventory_production_chain.py > production-chain.log 2>&1
          exit_code=$?
          echo "$exit_code" > production-chain.exitcode
          cat production-chain.log
          exit "$exit_code"

      - name: Upload productie-ketendiagnose
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: receipt-inventory-production-chain-diagnostic
          path: |
            production-chain.log
            production-chain.exitcode
          if-no-files-found: error
          retention-days: 3

      - name: Blokkeer bij rode productie-keten
        if: always()
        run: |
          test -f production-chain.exitcode
          test "$(cat production-chain.exitcode)" = "0"

  validate-regression-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compileer volledige backend
        run: python -m compileall -q backend/app

      - name: Valideer SSOT-releaseguard
        run: python tools/check_r7c22_ssot_release_guard.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installeer frontend-afhankelijkheden
        working-directory: frontend
        run: npm ci

      - name: Bouw productiefrontend
        working-directory: frontend
        run: npm run build
