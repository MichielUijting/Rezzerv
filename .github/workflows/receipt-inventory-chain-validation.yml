name: Receipt inventory chain validation

on:
  push:
    branches:
      - m2c2m-ketentest-receipt-inventory-step1
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-isolated-chain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile geïsoleerde ketentestmodules
        run: |
          python -m py_compile \
            backend/app/testing/receipt_inventory_chain_contract.py \
            backend/app/testing/receipt_inventory_chain_test_db.py \
            backend/app/testing/receipt_inventory_chain_step3.py \
            backend/app/testing/receipt_inventory_chain_step4.py

      - name: Valideer testcontract
        run: python -m backend.app.testing.receipt_inventory_chain_contract

      - name: Voer geïsoleerde ketenvalidatie uit
        run: python -m backend.app.testing.receipt_inventory_chain_step4

  validate-production-chain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installeer minimale backend-afhankelijkheden
        run: |
          python -m pip install --quiet \
            fastapi==0.115.0 \
            sqlalchemy==2.0.36 \
            pydantic==2.12.5 \
            python-multipart==0.0.20 \
            pypdf==5.4.0 \
            Pillow \
            beautifulsoup4==4.12.3 \
            opencv-python-headless

      - name: Compile productie-ketentest
        run: python -m py_compile backend/app/testing/receipt_inventory_production_chain.py

      - name: Voer productie-keten uit en bewaar uitvoer
        id: production_chain
        continue-on-error: true
        env:
          PYTHONPATH: backend
          RECEIPT_STORAGE_ROOT: ${{ runner.temp }}/rezzerv-receipts
        run: |
          set +e
          python backend/app/testing/receipt_inventory_production_chain.py > production-chain.log 2>&1
          exit_code=$?
          echo "$exit_code" > production-chain.exitcode
          cat production-chain.log
          exit "$exit_code"

      - name: Upload productie-ketendiagnose
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: receipt-inventory-production-chain-diagnostic
          path: |
            production-chain.log
            production-chain.exitcode
          if-no-files-found: error
          retention-days: 3

      - name: Blokkeer bij rode productie-keten
        if: always()
        run: |
          test -f production-chain.exitcode
          test "$(cat production-chain.exitcode)" = "0"

  validate-regression-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compileer volledige backend
        run: python -m compileall -q backend/app

      - name: Valideer SSOT-releaseguard
        run: python tools/check_r7c22_ssot_release_guard.py

      - name: 10.1 Controleer Node- en npm-versies
        run: |
          node --version
          npm --version

      - name: 10.2 Controleer frontend-lockbestand
        run: |
          test -f frontend/package.json
          test -f frontend/package-lock.json
          node -e "const p=require('./frontend/package-lock.json'); if (!p.lockfileVersion) process.exit(1); console.log('lockfileVersion=' + p.lockfileVersion)"

      - name: 10.3 Set up Node en npm-cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 10.4 Valideer npm-cache
        working-directory: frontend
        run: npm cache verify

      - name: 10.5 Controleer npm-register
        working-directory: frontend
        run: timeout 30s npm ping

      - name: 10.6 Installeer frontend-afhankelijkheden en bewaar log
        id: frontend_install
        continue-on-error: true
        working-directory: frontend
        env:
          npm_config_audit: 'false'
          npm_config_fund: 'false'
          npm_config_fetch_retries: '1'
          npm_config_fetch_retry_mintimeout: '1000'
          npm_config_fetch_retry_maxtimeout: '5000'
        run: |
          set +e
          timeout 300s npm ci --no-audit --no-fund --prefer-offline --foreground-scripts > frontend-install.log 2>&1
          exit_code=$?
          echo "$exit_code" > frontend-install.exitcode
          cat frontend-install.log
          exit "$exit_code"

      - name: 10.7 Controleer Vite en esbuild-installatie
        if: always()
        working-directory: frontend
        run: |
          test -x node_modules/.bin/vite
          test -x node_modules/.bin/esbuild
          ./node_modules/.bin/vite --version
          ./node_modules/.bin/esbuild --version

      - name: 10.8 Upload installatiediagnose
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-install-diagnostic
          path: |
            frontend/frontend-install.log
            frontend/frontend-install.exitcode
          if-no-files-found: error
          retention-days: 3

      - name: 10.9 Blokkeer bij rode frontendinstallatie
        if: always()
        run: |
          test -f frontend/frontend-install.exitcode
          test "$(cat frontend/frontend-install.exitcode)" = "0"

      - name: 11.1 Bouw productiefrontend en bewaar diagnose
        id: frontend_build
        continue-on-error: true
        working-directory: frontend
        run: |
          set +e
          timeout 300s npm run build > frontend-build.log 2>&1
          exit_code=$?
          echo "$exit_code" > frontend-build.exitcode
          cat frontend-build.log
          exit "$exit_code"

      - name: 11.2 Upload frontend-builddiagnose
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-diagnostic
          path: |
            frontend/frontend-build.log
            frontend/frontend-build.exitcode
          if-no-files-found: error
          retention-days: 3

      - name: 11.3 Blokkeer bij rode frontendbuild
        if: always()
        run: |
          test -f frontend/frontend-build.exitcode
          test "$(cat frontend/frontend-build.exitcode)" = "0"
