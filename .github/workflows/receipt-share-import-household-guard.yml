name: Receipt share import household guard

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-receipt-share-import-household-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installeer minimale backend-afhankelijkheden
        run: |
          python -m pip install --quiet \
            fastapi==0.115.0 \
            httpx==0.27.2 \
            python-multipart==0.0.12

      - name: Compileer gewijzigde modules
        run: |
          python -m py_compile \
            backend/app/__init__.py \
            backend/app/services/receipt_share_import_household_guard.py \
            backend/app/testing/receipt_share_import_household_guard_contract.py

      - name: Voer HTTP-share-importcontract uit
        env:
          PYTHONPATH: backend
        run: |
          python -m app.testing.receipt_share_import_household_guard_contract | tee receipt-share-import-household-guard.log
          grep -F 'RECEIPT_SHARE_IMPORT_HOUSEHOLD_GUARD_GREEN' receipt-share-import-household-guard.log

  validate-loyalty-stamp-read-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installeer minimale loyaliteitsafhankelijkheden
        run: |
          python -m pip install --quiet \
            pytest \
            sqlalchemy \
            fastapi==0.115.0 \
            pydantic

      - name: Compileer loyaliteitsmodules
        run: |
          python -m py_compile \
            backend/app/services/loyalty_stamp_read_service.py \
            backend/app/api/loyalty_stamp_routes.py \
            backend/tests/test_loyalty_stamp_read_service.py

      - name: Voer read-only projectie- en huishoudisolatietests uit
        env:
          PYTHONPATH: backend
        run: python -m pytest -q backend/tests/test_loyalty_stamp_read_service.py

  validate-loyalty-stamps-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installeer frontend-afhankelijkheden
        working-directory: frontend
        run: npm ci

      - name: Bouw productiefrontend
        working-directory: frontend
        run: npm run build

      - name: Controleer Spaartegoeden-contract
        run: |
          python - <<'PY'
          from pathlib import Path

          home = Path('frontend/src/features/home/HomePage.jsx').read_text(encoding='utf-8')
          router = Path('frontend/src/app/router/AppRouter.jsx').read_text(encoding='utf-8')
          page = Path('frontend/src/features/loyaltyStamps/LoyaltyStampsPage.jsx').read_text(encoding='utf-8')

          checks = {
              'actiebutton': "label: 'Spaartegoeden'" in home,
              'navigatie': "navigate('/spaartegoeden')" in home,
              'beveiligde route': "path: '/spaartegoeden'" in router and '<Protected><LoyaltyStampsPage /></Protected>' in router,
              'programma-api': "'/api/loyalty-stamps/programs'" in page,
              'transactie-api': '/api/loyalty-stamps/transactions?' in page,
              'lege status': 'loyalty-stamps-empty' in page,
              'detailtabel': 'loyalty-stamp-transactions-table' in page,
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit('Ontbrekende frontendcontracten: ' + ', '.join(failed))
          print('LOYALTY_STAMPS_FRONTEND_GREEN')
          PY
