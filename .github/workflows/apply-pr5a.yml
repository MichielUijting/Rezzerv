name: Apply PR5A savings fix
on:
  push:
    branches: [automation/receipt-savings-stamps-pr5a]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python tools/apply_pr5a_savings_fix.py
      - run: |
          git config user.name 'rezzerv-bot'
          git config user.email 'bot@rezzerv.local'
          git add -A
          git commit -m "PR5A: Apply savings stamp fix (SSOT-safe)" || echo "no changes"
          git push
