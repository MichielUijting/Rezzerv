name: Apply PR4B discount fix
on:
  push:
    branches: [automation/receipt-discount-pr4b]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python tools/apply_pr4b_discount_fix.py
      - run: |
          git config user.name 'rezzerv-bot'
          git config user.email 'bot@rezzerv.local'
          git add -A
          git commit -m "PR4B: Apply discount logic fix (SSOT-safe)" || echo "no changes"
          git push
